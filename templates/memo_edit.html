{% extends "base.html" %}

{% block title %}메모 수정 - 나의 메모 앱{% endblock %}

{% block content %}
<!-- [이유 및 목적] 폼 기반 기존 메모 수정 양식 (POST /memos/{id}/edit) -->
<!-- [이점] 기존 데이터를 입력 폼에 Pre-fill하여 수정의 편의성을 제공하며, 검증 실패 시 입력값을 유지하고 에러를 표시함 -->
<div class="memo-edit">
    <h2 style="margin-bottom: 1.5rem; color: #007bff;">메모 수정</h2>
    
    <!-- method="post": 수정도 상태 변경 작업이므로 POST 사용 (HTML Form은 PUT 미지원 → REST 전환 시 PUT/PATCH로 매핑, docs/ssr_to_rest_migration.md 참고) -->
    <form action="/memos/{{ memo.id }}/edit" method="post">
        <div class="form-group">
            <label for="title">메모 제목</label>
            <input type="text" id="title" name="title" placeholder="메모 제목을 입력하세요 (필수)" value="{{ memo.title }}">
            <small style="color: #6c757d;">제목은 공백으로만 구성되거나 비어 있을 수 없습니다.</small>
        </div>
        
        <div class="form-group">
            <label for="content">메모 내용</label>
            <textarea id="content" name="content" placeholder="메모 본문 내용을 입력하세요 (필수)">{{ memo.content }}</textarea>
            <small style="color: #6c757d;">본문 내용은 비어 있을 수 없습니다.</small>
        </div>
        
        <div class="flex-actions" style="justify-content: flex-end; border-top: 1px solid #e9ecef; padding-top: 1.5rem;">
            <a href="/memos/{{ memo.id }}" class="btn btn-secondary">취소 및 상세로</a>
            <button type="submit" class="btn">수정 내용 저장</button>
        </div>
    </form>
</div>
{% endblock %}

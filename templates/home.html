{% extends "base.html" %}

{% block title %}나의 메모 앱 - 홈{% endblock %}

{% block content %}
<!-- [이유 및 목적] 홈 화면 구성 (GET /) -->
<!-- [이점] 앱의 목적을 설명하는 1~2줄의 명확한 안내문과 최소 2개 이상의 링크(목록, 등록)를 제공하여 요구사항을 100% 충족함 -->
<div style="text-align: center; padding: 2rem 0;">
    <h2 style="font-size: 2rem; color: #007bff; margin-bottom: 1rem;">나의 메모 앱</h2>
    <p style="font-size: 1.25rem; color: #555; margin-bottom: 2rem;">
        일상의 아이디어와 중요 사항을 기록하는 메모 관리 시스템입니다.<br>
        메모를 손쉽게 등록하고 목록 조회, 상세 조회, 수정, 삭제(CRUD)할 수 있습니다.
    </p>
    <div class="flex-actions" style="justify-content: center; gap: 20px;">
        <a href="/memos" class="btn">메모 목록 보기</a>
        <a href="/memos/new" class="btn btn-secondary">새 메모 작성</a>
    </div>
</div>
{% endblock %}
